# docker-compose.yml
# Docker orchestration settings for local development environment

version: '3.8'

services:
  # PHP Apache Web server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_web_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=school_db
      - DB_USER=school_user
      - DB_PASSWORD=school_pass
      - DEVELOPMENT=true
    depends_on:
      - db

  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: school_db_container
    restart: always
    environment:
      MARIADB_DATABASE: school_db
      MARIADB_USER: school_user
      MARIADB_PASSWORD: school_pass
      MARIADB_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-import schema.sql on container startup to seed database tables (users, news, ita)
      - ./config/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  # phpMyAdmin Interface
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: school_pma_container
    restart: always
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_pass
    depends_on:
      - db

volumes:
  db_data:
